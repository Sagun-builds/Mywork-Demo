<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Calculator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="calculator-shell">
    <h1>Modern Calculator</h1>
    <div class="calculator">
      <input id="display" class="display" type="text" placeholder="0" readonly aria-label="Calculator display" />
      <div id="error" class="error" aria-live="polite"></div>
      <div class="button-grid">
        <button class="button accent" data-value="7">7</button>
        <button class="button accent" data-value="8">8</button>
        <button class="button accent" data-value="9">9</button>
        <button class="button operator" data-value="/">÷</button>
        <button class="button accent" data-value="4">4</button>
        <button class="button accent" data-value="5">5</button>
        <button class="button accent" data-value="6">6</button>
        <button class="button operator" data-value="*">×</button>
        <button class="button accent" data-value="1">1</button>
        <button class="button accent" data-value="2">2</button>
        <button class="button accent" data-value="3">3</button>
        <button class="button operator" data-value="-">−</button>
        <button class="button accent" data-value="0">0</button>
        <button class="button accent" data-value=".">.</button>
        <button id="equals" class="button equals">=</button>
        <button class="button operator" data-value="+">+</button>
        <button id="clear" class="button control">C</button>
        <button id="backspace" class="button control">←</button>
        <button class="button operator" data-value="(">(</button>
        <button class="button operator" data-value=")">)</button>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
